<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotebookLM CSV Cleaner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text: #1a1916;
      --text-muted: #6b6860;
      --text-faint: #a09d97;
      --accent: #2563eb;
      --accent-bg: #eff6ff;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --surface: #1e1d1a;
        --surface2: #27261f;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.16);
        --text: #f0ede8;
        --text-muted: #9a9690;
        --text-faint: #5a5850;
        --accent: #60a5fa;
        --accent-bg: #1e2d45;
        --success: #4ade80;
        --success-bg: #14281e;
        --danger: #f87171;
        --danger-bg: #2c1414;
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent-bg);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: 46px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .drop-zone {
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--radius);
      padding: 1.75rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 1rem;
    }

    .drop-zone:hover, .drop-zone.over {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .drop-icon {
      width: 32px;
      height: 32px;
      margin: 0 auto 10px;
      color: var(--text-muted);
    }

    .drop-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .drop-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text-faint);
    }

    textarea {
      width: 100%;
      height: 130px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      resize: vertical;
      border-radius: var(--radius);
      padding: 10px 12px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-faint); }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
    }

    button:hover { background: var(--surface2); }
    button:active { transform: scale(0.98); }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover { opacity: 0.9; }

    button.ghost {
      border-color: transparent;
      color: var(--text-muted);
    }

    button.ghost:hover { background: var(--surface2); }

    .file-name {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 10px 14px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
    }

    .stat-value.success { color: var(--success); }
    .stat-value.muted { color: var(--text-muted); font-size: 14px; padding-top: 4px; }

    /* ---- Card Editor ---- */
    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .editor-label-main {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .editor-hint {
      font-size: 11px;
      color: var(--text-faint);
    }

    .editor-card {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 12px 14px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }

    .editor-card:focus-within {
      border-color: var(--accent);
    }

    .editor-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .card-num {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-faint);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }

    .delete-btn {
      padding: 4px 6px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-faint);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: background 0.12s, color 0.12s;
    }

    .delete-btn:hover {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: rgba(220,38,38,0.15);
    }

    .editor-field {
      margin-bottom: 8px;
    }

    .editor-field:last-child {
      margin-bottom: 0;
    }

    .editor-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'DM Mono', monospace;
      display: block;
      margin-bottom: 4px;
    }

    .editor-textarea {
      width: 100%;
      height: auto;
      min-height: 52px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      border-radius: 7px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .editor-textarea:focus {
      border-color: var(--accent);
    }

    .error-box {
      background: var(--danger-bg);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-top: 10px;
    }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .stat-value { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 5h12v9a1 1 0 01-1 1H4a1 1 0 01-1-1V5z" stroke="#2563eb" stroke-width="1.4"/>
            <path d="M1.5 5h15M6 5V4a1 1 0 011-1h4a1 1 0 011 1v1" stroke="#2563eb" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M6.5 9.5l2 2 3-3" stroke="#2563eb" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>NotebookLM CSV Cleaner</h1>
      </div>
      <p class="subtitle">Fixes LaTeX formatting for clean Anki imports</p>
    </header>

    <div class="card">
      <div class="drop-zone" id="drop-zone"
        onclick="document.getElementById('file-input').click()"
        ondragover="handleDragOver(event)"
        ondragleave="handleDragLeave(event)"
        ondrop="handleDrop(event)">
        <svg class="drop-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 22V10M16 10l-4 4M16 10l4 4"/>
          <path d="M26 21a6 6 0 00-5.5-6H20a8 8 0 10-15.7 2"/>
        </svg>
        <p class="drop-title">Drop your CSV here or tap to upload</p>
        <p class="drop-sub">.csv files only</p>
        <input type="file" id="file-input" accept=".csv" style="display:none" onchange="handleFile(event)">
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or paste below</span>
        <div class="divider-line"></div>
      </div>

      <textarea id="csv-input" placeholder="Paste your NotebookLM CSV content here..."></textarea>

      <div class="actions">
        <button class="primary" onclick="cleanCSV()">Clean & preview</button>
        <button class="ghost" onclick="clearAll()">Clear</button>
        <span class="file-name" id="file-name"></span>
      </div>

      <div class="error-box hidden" id="error-msg"></div>
    </div>

    <div id="results-section" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Cards</div>
          <div class="stat-value" id="stat-cards">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Fixes</div>
          <div class="stat-value success" id="stat-fixes">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Status</div>
          <div class="stat-value muted" id="stat-status">—</div>
        </div>
      </div>

      <div class="card">
        <div class="editor-header">
          <span class="editor-label-main">Cards — edit or delete before export</span>
          <span class="editor-hint">All cards shown</span>
        </div>
        <div id="card-editor"></div>

        <div style="margin-top: 1rem; background: var(--surface2); border-radius: var(--radius); padding: 12px 14px;">
          <p style="font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 8px;">File name</p>
          <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; flex: 1; min-width: 160px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); overflow: hidden;">
              <input id="filename-input" type="text" value="anki_ready" placeholder="file name" style="flex:1; border:none; background:transparent; padding: 8px 10px; font-size:13px; color:var(--text); outline:none; font-family:'DM Mono',monospace;" />
              <span style="padding: 8px 10px 8px 0; font-size:12px; color:var(--text-muted); font-family:'DM Mono',monospace;">.csv</span>
            </div>
            <button class="primary" onclick="downloadCSV()">Download</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="cleaner.js"></script>
</body>
</html>
